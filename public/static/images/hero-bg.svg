<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2f9"/>
      <stop offset="100%" stop-color="#dfe7f4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(42,111,219,0.10)" stroke-width="1"/>
    </pattern>
    <pattern id="gridBig" width="300" height="300" patternUnits="userSpaceOnUse">
      <path d="M 300 0 L 0 0 0 300" fill="none" stroke="rgba(42,111,219,0.16)" stroke-width="1.4"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#gridBig)"/>

  <!-- ground line -->
  <line x1="0" y1="860" x2="1920" y2="860" stroke="#2a6fdb" stroke-width="1.5" stroke-dasharray="10 8" opacity="0.5"/>

  <!-- house outline (blueprint style) -->
  <g stroke="#1d4fa0" stroke-width="3" fill="none" stroke-linejoin="round" opacity="0.9">
    <path d="M 640 860 L 640 560 L 980 380 L 1320 560 L 1320 860 Z"/>
    <line x1="640" y1="560" x2="1320" y2="560" stroke-dasharray="6 6" opacity="0.6"/>
    <rect x="700" y="660" width="110" height="200" />
    <rect x="900" y="700" width="90" height="90"/>
    <rect x="1080" y="700" width="90" height="90"/>
    <rect x="1210" y="660" width="70" height="90"/>
  </g>

  <!-- solar panels on roof -->
  <g stroke="#c8a84e" stroke-width="2.5" fill="rgba(200,168,78,0.08)">
    <path d="M 720 520 L 960 400 L 1020 428 L 780 548 Z"/>
    <line x1="765" y1="513" x2="1005" y2="393" stroke-width="1.2"/>
    <line x1="800" y1="530" x2="1040" y2="410" stroke-width="1.2"/>
    <line x1="850" y1="463" x2="880" y2="608" stroke-width="1.2" opacity="0.6"/>
    <line x1="900" y1="438" x2="930" y2="583" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- sun / energy rays -->
  <g stroke="#c8a84e" stroke-width="2" opacity="0.7">
    <circle cx="1560" cy="260" r="46" fill="none"/>
    <line x1="1560" y1="170" x2="1560" y2="130"/>
    <line x1="1560" y1="350" x2="1560" y2="390"/>
    <line x1="1470" y1="260" x2="1430" y2="260"/>
    <line x1="1650" y1="260" x2="1690" y2="260"/>
    <line x1="1497" y1="197" x2="1468" y2="168"/>
    <line x1="1623" y1="197" x2="1652" y2="168"/>
    <line x1="1497" y1="323" x2="1468" y2="352"/>
    <line x1="1623" y1="323" x2="1652" y2="352"/>
  </g>

  <!-- battery unit beside house -->
  <g stroke="#2a6fdb" stroke-width="2.5" fill="rgba(42,111,219,0.06)">
    <rect x="1380" y="740" width="90" height="120" rx="4"/>
    <rect x="1408" y="722" width="34" height="18" rx="2"/>
    <line x1="1400" y1="820" x2="1440" y2="780" stroke="#c8a84e" stroke-width="3" stroke-linecap="round"/>
    <line x1="1400" y1="780" x2="1425" y2="780" stroke="#c8a84e" stroke-width="3" stroke-linecap="round"/>
    <line x1="1425" y1="780" x2="1420" y2="800" stroke="#c8a84e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- water purifier drop icon -->
  <g stroke="#2a6fdb" stroke-width="2.5" fill="rgba(93,160,255,0.10)">
    <path d="M 560 780 C 560 750, 600 710, 600 710 C 600 710, 640 750, 640 780 A 40 40 0 1 1 560 780 Z"/>
  </g>

  <!-- dimension annotations -->
  <g font-family="'Roboto Mono', monospace" font-size="16" fill="#4a7fd8" opacity="0.55">
    <text x="90" y="120">SOLAR / BATTERY / REFORM</text>
    <text x="90" y="148">総合エネルギー ✕ 住宅リフォーム</text>
  </g>
  <g stroke="#2a6fdb" stroke-width="1" opacity="0.35">
    <line x1="640" y1="900" x2="1320" y2="900"/>
    <line x1="640" y1="892" x2="640" y2="908"/>
    <line x1="1320" y1="892" x2="1320" y2="908"/>
  </g>
</svg>
